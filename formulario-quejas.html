<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes & Sugerencias 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink:   #F2C4CE;
      --rose:   #C47B8A;
      --brown:  #A0695A;
      --dark:   #5C3A2E;
      --light:  #FDF5F0;
      --card:   #ffffff;
      --border: #EDD5C0;
      --muted:  #A0695A;
    }
    body {
      background: var(--light);
      background-image: radial-gradient(circle, #F2C4CE40 1.5px, transparent 1.5px);
      background-size: 22px 22px;
      color: var(--dark);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
    }
    .card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 48px #C47B8A18, 0 2px 12px #F2C4CE30;
      position: relative;
    }
    .bow {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      line-height: 1;
      filter: drop-shadow(0 2px 6px #C47B8A40);
    }
    .header {
      text-align: center;
      margin-bottom: 1.75rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px dashed var(--border);
    }
    .tag {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--rose);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    h1 { font-size: 1.65rem; font-weight: 800; color: var(--brown); line-height: 1.2; }
    .subtitle { margin-top: 0.4rem; font-size: 0.82rem; color: var(--muted); }
    .subtitle strong { color: var(--rose); }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 0.35rem;
    }
    input, select, textarea {
      width: 100%;
      background: #FDF5F0;
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--dark);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      padding: 0.65rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px #F2C4CE40;
    }
    textarea { resize: vertical; min-height: 110px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    .hp { display: none; }
    button[type="submit"] {
      width: 100%;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--brown), var(--rose));
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      padding: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px #C47B8A40;
    }
    button[type="submit"]:hover  { opacity: 0.88; }
    button[type="submit"]:active { transform: scale(0.98); }
    .footer-note { margin-top: 1rem; text-align: center; font-size: 0.74rem; color: var(--muted); }
    .footer-note a { color: var(--rose); text-decoration: none; font-weight: 700; }
    #success-msg { display: none; text-align: center; padding: 1.5rem 0 0.5rem; }
    #success-msg .check { font-size: 3.5rem; margin-bottom: 0.75rem; }
    #success-msg h2 { font-size: 1.4rem; font-weight: 800; color: var(--brown); margin-bottom: 0.4rem; }
    #success-msg p { font-size: 0.85rem; color: var(--muted); }

    /* sunset decoration */
    .deco-bar {
      height: 6px;
      border-radius: 0 0 6px 6px;
      background: linear-gradient(90deg, #F2C4CE, #EDD5C0, #C47B8A, #A0695A);
      position: absolute;
      top: 0; left: 0; right: 0;
      border-radius: 26px 26px 0 0;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="deco-bar"></div>
  <div class="bow">🎀</div>

  <div class="header">
    <div class="tag">🐱 Kawaii Dev Space</div>
    <h1>Zona de Reportes<br>& Sugerencias</h1>
    <p class="subtitle">Tu mensaje llega directo a <strong>3714383@clases.edu.sv</strong> 💌</p>
  </div>

  <form id="complaint-form" action="https://formspree.io/f/mkoarepp" method="POST">
    <input type="hidden" name="_subject" value="🎀 Nuevo reporte — Kawaii Dev Space"/>
    <div class="hp"><input type="text" name="_gotcha" tabindex="-1" autocomplete="off"/></div>

    <div class="row">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required/>
      </div>
      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required/>
      </div>
    </div>

    <div class="form-group">
      <label for="tipo">Tipo de reporte</label>
      <select id="tipo" name="tipo" required>
        <option value="" disabled selected>Selecciona una categoría</option>
        <option value="Bug en código">🐛 Bug en código</option>
        <option value="Error en documentación">📄 Error en documentación</option>
        <option value="Sugerencia de mejora">💡 Sugerencia de mejora</option>
        <option value="Queja general">🎀 Queja general</option>
        <option value="Otro">🌸 Otro</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mensaje">Descripción</label>
      <textarea id="mensaje" name="mensaje" placeholder="Cuéntame con detalle qué pasó o qué mejorarías... 🌅" required></textarea>
    </div>

    <button type="submit">🌸 Enviar Reporte</button>
    <p class="footer-note">
      Powered by <a href="https://formspree.io" target="_blank">Formspree</a> · Respuesta en 24–48h 🎀
    </p>
  </form>

  <div id="success-msg">
    <div class="check">🌅</div>
    <h2>¡Mensaje enviado!</h2>
    <p>Tu reporte llegó con mucho amor. ¡Gracias por escribir! 🐱</p>
  </div>
</div>

<script>
  const form = document.getElementById('complaint-form');
  const successMsg = document.getElementById('success-msg');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    try {
      const res = await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
      if (res.ok) { form.style.display = 'none'; successMsg.style.display = 'block'; }
      else { alert('Hubo un error al enviar. Escribe directamente a 3714383@clases.edu.sv 💌'); }
    } catch { alert('Error de conexión. Intenta de nuevo 🌸'); }
  });
</script>
</body>
</html>
